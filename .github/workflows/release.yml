name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify VERSION matches tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          FILE="$(tr -d '[:space:]' < VERSION)"
          if [ "$FILE" != "$TAG" ]; then
            echo "VERSION file ($FILE) does not match tag ($TAG)" >&2
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FlightScnr Pi ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
